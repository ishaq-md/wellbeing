<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mental Wellness Manager</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Wellness tracker - By Ishaq Mohammed</p>
        <h1>Mental Wellness Manager</h1>
        <p class="subtitle">Track your mood, sleep, exercise, hydration, meditation, and stress in one easy dashboard.</p>
      </div>
      <div class="hero-cta">
        <a class="button" href="#entry-form">Add daily entry</a>
      </div>
    </header>

    <main>
      <section class="panel" id="entry-form">
        <div class="panel-header">
          <h2>Log your wellness</h2>
          <p>Fill out today’s details and save them instantly.</p>
        </div>
        <form id="wellness-form" class="form-grid">
          <label>
            Mood <span class="hint">1–10</span>
            <input name="mood" type="number" min="1" max="10" value="7" required />
          </label>
          <label>
            Sleep hours
            <input name="sleep" type="number" min="0" max="24" step="0.5" value="7.5" required />
          </label>
          <label>
            Exercise minutes
            <input name="exercise" type="number" min="0" max="300" value="30" required />
          </label>
          <label>
            Water glasses
            <input name="water" type="number" min="0" max="20" value="8" required />
          </label>
          <label>
            Meditation minutes
            <input name="meditation" type="number" min="0" max="180" value="15" required />
          </label>
          <label>
            Stress level <span class="hint">1–10</span>
            <input name="stress" type="number" min="1" max="10" value="4" required />
          </label>
          <label class="full-width">
            Notes
            <textarea name="notes" rows="4" placeholder="Add thoughts or reflections..."></textarea>
          </label>
          <div class="form-actions full-width">
            <button type="submit" class="button button-primary">Save entry</button>
            <span id="status-message" class="status-message"></span>
          </div>
        </form>
      </section>

      <section class="grid-3">
        <article class="stat-card">
          <h3>Summary</h3>
          <div id="summary-cards" class="stat-grid"></div>
        </article>
        <article class="stat-card">
          <h3>Latest entries</h3>
          <div id="entry-list" class="entry-list"></div>
        </article>
        <article class="stat-card">
          <h3>Trends</h3>
          <div id="trend-list" class="trend-list"></div>
        </article>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
